<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <title>Contact Us | True Craft Tile & Stone</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />

    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        [x-cloak] { display: none !important; }

        /* Animated Grid & Orbs */
        @keyframes moveGrid { from { background-position: 0px 0px; } to { background-position: 24px 24px; } }
        .moving-grid { animation: moveGrid 3s linear infinite; }
        
        @keyframes float1 { 0%, 100% { transform: translate(0, 0) scale(1); } 33% { transform: translate(100px, 50px) scale(1.3); } 66% { transform: translate(-50px, -30px) scale(0.9); } }
        .orb-1 { animation: float1 15s ease-in-out infinite; }

        .form-container { transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1); }

        /* Pulse Animation for Sticky Button */
        .pulse-blue { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900" x-data="{ 
    mobileMenu: false,
    submitted: false, 
    loading: false,
    async submitForm(e) {
        this.loading = true;
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzVCxLxV4PkIEphyQjj-9nCCNxVDhqJnvz8ALcUFYIVd3_6oNZD_EDRRmSW1KV3khBCEg/exec';
        const formData = new FormData(e.target);
        try {
            await fetch(scriptURL, { method: 'POST', body: formData, mode: 'no-cors' });
            this.loading = false;
            this.submitted = true;
        } catch (err) {
            alert('Submission failed. Please call 952-486-0554');
            this.loading = false;
        }
    }
}">

    <a href="tel:9524860554" class="fixed bottom-8 right-8 z-[60] bg-blue-600 text-white px-6 py-4 rounded-full font-bold shadow-2xl pulse-blue flex items-center gap-3 hover:bg-blue-700 transition-all">
        <span class="text-xs uppercase tracking-widest text-white">Call Now</span>
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
    </a>

    <nav class="fixed w-full z-[100] bg-white/95 backdrop-blur-md border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3 group">
                <img src="TC tile.jpg" class="h-12 w-auto transition-transform group-hover:scale-105" alt="True Craft Tile & Stone Logo" />
                <div class="flex flex-col">
                    <span class="font-bold text-lg tracking-tighter text-slate-900 leading-none">True Craft</span>
                    <span class="text-[10px] uppercase tracking-[0.3em] text-blue-700 font-black">Tile & Stone</span>
                </div>
            </a>

            <div class="hidden lg:flex items-center space-x-10 font-bold text-xs uppercase tracking-widest text-slate-500">
                <a href="index.html" class="hover:text-blue-700 transition-colors">Home</a>
                <a href="index.html#services" class="hover:text-blue-700 transition-colors">Services</a>
                <a href="gallery/index.html" class="hover:text-blue-700 transition-colors">Gallery</a>
                <a href="tel:9524860554" class="bg-slate-900 text-white px-6 py-3 rounded-xl hover:bg-blue-700 transition-all shadow-lg">Call Now</a>
            </div>

            <button class="lg:hidden text-slate-900 focus:outline-none" @click="mobileMenu = !mobileMenu">
                <svg x-show="!mobileMenu" class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                <svg x-show="mobileMenu" x-cloak class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>

        <div x-show="mobileMenu" 
             x-cloak
             @click.away="mobileMenu = false"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 -translate-y-4"
             x-transition:enter-end="opacity-100 translate-y-0"
             class="lg:hidden bg-white border-b border-slate-100 px-6 py-8 space-y-6 shadow-2xl absolute w-full top-full left-0">
            <a href="index.html" class="block text-xl font-bold text-slate-900" @click="mobileMenu = false">Home</a>
            <a href="index.html#services" class="block text-xl font-bold text-slate-900" @click="mobileMenu = false">Services</a>
            <a href="gallery/index.html" class="block text-xl font-bold text-slate-900" @click="mobileMenu = false">Gallery</a>
            <hr class="border-slate-100">
            <a href="tel:9524860554" class="block w-full text-center bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">Call Now</a>
        </div>
    </nav>

    <header class="relative pt-48 pb-24 bg-slate-950 overflow-hidden text-center">
        <div class="absolute inset-0 bg-[linear-gradient(to_right,#80808012_1px,transparent_1px),linear-gradient(to_bottom,#80808012_1px,transparent_1px)] bg-[size:24px_24px] moving-grid opacity-20"></div>
        <div class="absolute top-0 right-0 w-[500px] h-[500px] rounded-full blur-3xl orb-1" style="background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);"></div>
        
        <div class="relative z-10 max-w-4xl mx-auto px-6">
            <h1 class="text-5xl md:text-7xl font-bold text-white mb-4 tracking-tighter uppercase">Get Your <span class="text-blue-500">Master Quote</span></h1>
            <p class="text-slate-400 text-lg max-w-2xl mx-auto font-medium">Connect with 35+ years of tiling precision.</p>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 -mt-16 pb-32 relative z-20">
        <div class="bg-slate-900 rounded-[2.5rem] p-8 lg:p-12 shadow-2xl text-white border border-slate-800 form-container">
            
            <div x-show="!submitted">
                <h3 class="text-2xl font-bold mb-8 uppercase tracking-widest text-blue-500">Project Inquiry</h3>
                
                <form @submit.prevent="submitForm($event)" class="space-y-5">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-500 ml-2">Name</label>
                            <input type="text" name="name" placeholder="Name" required 
                                   class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-blue-500 transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-500 ml-2">Phone</label>
                            <input type="tel" name="phone" placeholder="952-486-0554" required 
                                   class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-blue-500 transition-all">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-500 ml-2">Email</label>
                        <input type="email" name="email" placeholder="Email Address" required 
                               class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-blue-500 transition-all">
                    </div>

                    <div class="space-y-2">
                        <label class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-500 ml-2">Service Needed</label>
                        <select name="service" required class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-blue-500 transition-all appearance-none">
                            <option disabled selected value="">Select a Service</option>
                            <option>Kitchen Backsplash</option>
                            <option>Custom Shower</option>
                            <option>Flooring Installation</option>
                            <option>Fireplace Tile</option>
                            <option>Commercial Project</option>
                        </select>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-500 ml-2">Your Vision</label>
                        <textarea name="message" placeholder="Details..." rows="4" 
                                  class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-blue-500 transition-all"></textarea>
                    </div>

                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl uppercase tracking-widest transition-all shadow-xl shadow-blue-900/40 disabled:opacity-50" :disabled="loading">
                        <span x-show="!loading">Send Request</span>
                        <span x-show="loading">Processing Submission...</span>
                    </button>
                </form>
            </div>

            <div x-show="submitted" class="text-center py-16" x-cloak>
                <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-600/20 text-blue-500 text-5xl rounded-full mb-6">✓</div>
                <h3 class="text-3xl font-bold uppercase mb-4 tracking-tighter">Thank You</h3>
                <p class="text-slate-400 text-lg mb-8">Your request is in our system. We will contact you shortly.</p>
                <a href="index.html" class="inline-block border border-slate-700 hover:border-blue-500 px-8 py-3 rounded-xl transition-all text-sm font-bold uppercase tracking-widest">Return Home</a>
            </div>
        </div>
    </main>

    <footer class="py-12 text-center border-t border-slate-200 bg-white">
        <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.5em]">&copy; 2026 True Craft Tile & Stone</p>
    </footer>
</body>
</html>
