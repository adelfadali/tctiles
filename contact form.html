<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <title>Contact Us | True Craft Tile & Stone</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />

    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        [x-cloak] { display: none !important; }

        /* Animated Grid & Orbs from Landing Page */
        @keyframes moveGrid { from { background-position: 0px 0px; } to { background-position: 24px 24px; } }
        .moving-grid { animation: moveGrid 3s linear infinite; }
        
        @keyframes float1 { 0%, 100% { transform: translate(0, 0) scale(1); } 33% { transform: translate(100px, 50px) scale(1.3); } 66% { transform: translate(-50px, -30px) scale(0.9); } }
        .orb-1 { animation: float1 15s ease-in-out infinite; }

        .form-container { transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900" x-data="{ 
    submitted: false, 
    loading: false,
    async submitForm(e) {
        this.loading = true;
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzVCxLxV4PkIEphyQjj-9nCCNxVDhqJnvz8ALcUFYIVd3_6oNZD_EDRRmSW1KV3khBCEg/exec';
        const formData = new FormData(e.target);
        try {
            await fetch(scriptURL, { method: 'POST', body: formData, mode: 'no-cors' });
            this.loading = false;
            this.submitted = true;
        } catch (err) {
            alert('Submission failed. Please call 952-486-0554');
            this.loading = false;
        }
    }
}">

    <nav class="fixed w-full z-50 bg-white/95 backdrop-blur-md border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3">
                <img src="TC tile.jpg" class="h-14 w-auto" alt="Logo" />
                <span class="font-bold text-lg tracking-tighter text-slate-900 hidden sm:block">True Craft Tile & Stone</span>
            </a>
            <div class="flex items-center space-x-8 font-bold text-xs uppercase tracking-widest text-slate-500">
                <a href="index.html" class="hover:text-blue-700 transition">Back to Home</a>
                <a href="tel:9524860554" class="bg-slate-900 text-white px-5 py-2.5 rounded-lg hover:bg-blue-600 transition">Call Now</a>
            </div>
        </div>
    </nav>

    <header class="relative pt-40 pb-24 bg-slate-950 overflow-hidden text-center">
        <div class="absolute inset-0 bg-[linear-gradient(to_right,#80808012_1px,transparent_1px),linear-gradient(to_bottom,#80808012_1px,transparent_1px)] bg-[size:24px_24px] moving-grid opacity-20"></div>
        <div class="absolute top-0 right-0 w-[500px] h-[500px] rounded-full blur-3xl orb-1" style="background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);"></div>
        
        <div class="relative z-10 max-w-4xl mx-auto px-6">
            <h1 class="text-5xl md:text-7xl font-bold text-white mb-4 tracking-tighter">Get Your <span class="text-blue-500">Master Quote</span></h1>
            <p class="text-slate-400 text-lg max-w-2xl mx-auto font-medium">Connect with 35+ years of tiling precision.</p>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 -mt-16 pb-32 relative z-20">
        <div class="bg-slate-900 rounded-[2.5rem] p-8 lg:p-12 shadow-2xl text-white border border-slate-800 form-container">
            
            <div x-show="!submitted">
                <h3 class="text-2xl font-bold mb-8 uppercase tracking-widest text-blue-500">Project Inquiry</h3>
                
                <form @submit.prevent="submitForm($event)" class="space-y-5">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-500 ml-2">Name</label>
                            <input type="text" name="name" placeholder="Name" required 
                                   class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-blue-500 transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-500 ml-2">Phone</label>
                            <input type="tel" name="phone" placeholder="952-486-0554" required 
                                   class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-blue-500 transition-all">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-500 ml-2">Email</label>
                        <input type="email" name="email" placeholder="Email Address" required 
                               class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-blue-500 transition-all">
                    </div>

                    <div class="space-y-2">
                        <label class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-500 ml-2">Service Needed</label>
                        <select name="service" required class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-blue-500 transition-all appearance-none">
                            <option disabled selected value="">Select a Service</option>
                            <option>Kitchen Backsplash</option>
                            <option>Custom Shower</option>
                            <option>Flooring Installation</option>
                            <option>Fireplace Tile</option>
                            <option>Commercial Project</option>
                        </select>
                    </div>

                    <div class="space-y-2">
                        <label class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-500 ml-2">Your Vision</label>
                        <textarea name="message" placeholder="Details..." rows="4" 
                                  class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-blue-500 transition-all"></textarea>
                    </div>

                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl uppercase tracking-widest transition-all shadow-xl shadow-blue-900/40 disabled:opacity-50" :disabled="loading">
                        <span x-show="!loading">Send Request</span>
                        <span x-show="loading">Processing Submission...</span>
                    </button>
                </form>
            </div>

            <div x-show="submitted" class="text-center py-16" x-cloak>
                <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-600/20 text-blue-500 text-5xl rounded-full mb-6">✓</div>
                <h3 class="text-3xl font-bold uppercase mb-4 tracking-tighter">Thank You</h3>
                <p class="text-slate-400 text-lg mb-8">Your request is in our system. We will contact you shortly.</p>
                <a href="index.html" class="inline-block border border-slate-700 hover:border-blue-500 px-8 py-3 rounded-xl transition-all text-sm font-bold uppercase tracking-widest">Return Home</a>
            </div>
        </div>
    </main>

    <footer class="py-12 text-center border-t border-slate-200 bg-white">
        <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.5em]">&copy; 2026 True Craft Tile & Stone</p>
    </footer>
</body>
</html>
