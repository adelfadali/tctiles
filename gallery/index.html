    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />

    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        [x-cloak] { display: none !important; }

        @keyframes moveGrid { from { background-position: 0px 0px; } to { background-position: 24px 24px; } }
        .moving-grid { animation: moveGrid 3s linear infinite; }
        
        .project-card { transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1); }
        .project-card:hover { transform: translateY(-10px); }

        .pulse-blue { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

                ]


    
            }
        ],
        get filteredProjects() {
            return this.projects.filter(p => {
                const matchCat = this.category === 'all' || p.category === this.category;
                const matchSearch = p.title.toLowerCase().includes(this.search.toLowerCase()) || 
                                    p.location.toLowerCase().includes(this.search.toLowerCase());
                return matchCat && matchSearch;
            });
        },
        openProject(project) {
            this.activeProject = project;
            document.body.style.overflow = 'hidden';
        },
        closeProject() {
            this.activeProject = null;
            this.fullscreenPhoto = null;
            document.body.style.overflow = 'auto';
        },
        async submitForm(e) {
            this.loading = true;
            const scriptURL = 'https://script.google.com/macros/s/AKfycbzVCxLxV4PkIEphyQjj-9nCCNxVDhqJnvz8ALcUFYIVd3_6oNZD_EDRRmSW1KV3khBCEg/exec';
            const formData = new FormData(e.target);
            try {
                await fetch(scriptURL, { method: 'POST', body: formData, mode: 'no-cors' });
                this.loading = false;
                this.submitted = true;
            } catch (err) {
                alert('Submission failed. Please call 952-486-0554');
                this.loading = false;
            }
        }
      }">

    <a href="contact form.html" class="fixed bottom-8 right-8 z-[60] bg-blue-600 text-white px-6 py-4 rounded-full font-bold shadow-2xl pulse-blue flex items-center gap-3 hover:bg-blue-700 transition-all">

        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
    </a>

<nav class="fixed w-full z-[100] bg-white/95 backdrop-blur-md border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="../index.html" class="flex items-center gap-3 group">
                <img src="../TC tile.jpg" class="h-12 w-auto transition-transform group-hover:scale-105" alt="True Craft Tile & Stone Logo" />
                <div class="flex flex-col">
                    <span class="font-bold text-lg tracking-tighter text-slate-900 leading-none">True Craft</span>
                    <span class="text-[10px] uppercase tracking-[0.3em] text-blue-700 font-black">Tile & Stone</span>
                </div>
            </a>

            <div class="hidden lg:flex items-center space-x-10 font-bold text-xs uppercase tracking-widest text-slate-500">
                <a href="../index.html" class="hover:text-blue-700 transition-colors">Home</a>
                <a href="../index.html#services" class="hover:text-blue-700 transition-colors">Services</a>
                <a href="index.html" class="text-blue-700">Gallery</a>
                <a href="../contact form.html" class="bg-slate-900 text-white px-6 py-3 rounded-xl hover:bg-blue-700 transition-all shadow-lg">Get Quote</a>
            </div>

            <button class="lg:hidden text-slate-900 focus:outline-none" @click="mobileMenu = !mobileMenu">
                <svg x-show="!mobileMenu" class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                <svg x-show="mobileMenu" x-cloak class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>

        <div x-show="mobileMenu" 
             x-cloak
             @click.away="mobileMenu = false"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 -translate-y-4"
             x-transition:enter-end="opacity-100 translate-y-0"
             class="lg:hidden bg-white border-b border-slate-100 px-6 py-8 space-y-6 shadow-2xl absolute w-full top-full left-0">
            <a href="../index.html" class="block text-xl font-bold text-slate-900" @click="mobileMenu = false">Home</a>
            <a href="../index.html#services" class="block text-xl font-bold text-slate-900" @click="mobileMenu = false">Services</a>
            <a href="index.html" class="block text-xl font-bold text-blue-600" @click="mobileMenu = false">Gallery</a>
            <hr class="border-slate-100">
            <a href="../contact form.html" class="block w-full text-center bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg" @click="mobileMenu = false">Request a Quote</a>
        </div>
    </nav> 

    <header class="relative pt-48 pb-28 bg-slate-950 overflow-hidden text-center">
        <div class="absolute inset-0 bg-[size:24px_24px] moving-grid opacity-10" style="background-image: linear-gradient(to right, #80808012 1px, transparent 1px), linear-gradient(to bottom, #80808012 1px, transparent 1px);"></div>
        <div class="relative z-10 max-w-7xl mx-auto px-6">
            <h1 class="text-6xl md:text-8xl font-bold text-white mb-8 tracking-tighter">Master <span class="text-blue-500">Portfolio</span></h1>
            <input type="text" x-model="search" placeholder="Search by city..." class="max-w-xl w-full bg-slate-800/50 border border-slate-700 rounded-2xl py-5 px-8 text-white outline-none focus:border-blue-500 transition-all">
        </div>
    </header>

    <section class="sticky top-[75px] z-40 bg-white/95 backdrop-blur-md border-b border-slate-100 py-6">
        <div class="max-w-7xl mx-auto px-6 overflow-x-auto no-scrollbar">
            <div class="flex flex-nowrap md:flex-wrap gap-3 justify-start md:justify-center">
                <template x-for="cat in ['all', 'kitchens', 'showers', 'floorings', 'fireplace', 'commercial']">
                    <button @click="category = cat" 
                            :class="category === cat 
                                ? 'bg-white text-blue-600 border-blue-600 shadow-lg' 
                                : 'bg-blue-600 text-white border-blue-600 hover:bg-blue-700'"
                            class="px-6 py-2.5 rounded-xl font-bold uppercase text-[10px] tracking-widest border transition-all whitespace-nowrap">
                        <span x-text="cat"></span>
                    </button>
                </template>
            </div>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-6 py-20">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <template x-for="project in filteredProjects" :key="project.id">
                <div class="project-card group cursor-pointer" @click="openProject(project)">
                    <div class="relative aspect-[4/5] overflow-hidden rounded-[2.5rem] shadow-2xl border border-slate-100 bg-slate-50">
                        <img :src="project.images[0]" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-transparent to-transparent p-10 flex flex-col justify-end">
                            <h3 class="text-white text-2xl font-bold" x-text="project.title"></h3>
                            <p class="text-blue-500 font-bold uppercase text-[10px] tracking-widest mt-1" x-text="project.location"></p>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <section id="contact-form" class="py-24 bg-slate-50 border-t border-slate-200">
        <div class="max-w-4xl mx-auto px-6">
            <div class="text-center mb-12">
                <h2 class="text-4xl lg:text-5xl font-bold uppercase tracking-tighter mb-4 text-slate-900">Start Your <span class="text-blue-700">Project</span></h2>
                <p class="text-slate-600 text-lg font-medium">Connect with 35+ years of tiling precision.</p>
            </div>

            <div class="bg-slate-900 rounded-[2.5rem] p-8 lg:p-12 shadow-2xl text-white relative overflow-hidden border border-slate-800">
                <div class="absolute inset-0 bg-[linear-gradient(to_right,#80808012_1px,transparent_1px),linear-gradient(to_bottom,#80808012_1px,transparent_1px)] bg-[size:24px_24px] opacity-20 pointer-events-none"></div>

                <div x-show="!submitted" class="relative z-10">
                    <form @submit.prevent="submitForm($event)" class="space-y-5">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <input type="text" name="name" placeholder="Full Name" required 
                                   class="bg-slate-800 border-2 border-slate-700 rounded-2xl p-5 text-white outline-none focus:border-blue-500 transition-all">
                            <input type="tel" name="phone" placeholder="Phone Number" required 
                                   class="bg-slate-800 border-2 border-slate-700 rounded-2xl p-5 text-white outline-none focus:border-blue-500 transition-all">
                        </div>
                        <input type="email" name="email" placeholder="Email Address" required 
                               class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl p-5 text-white outline-none focus:border-blue-500 transition-all">
                        
                        <select name="service" required class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl p-5 text-white outline-none focus:border-blue-500 transition-all appearance-none">
                            <option disabled selected value="">Select Project Type</option>
                            <option>Kitchen Backsplash</option>
                            <option>Custom Shower</option>
                            <option>Large Format Flooring</option>
                            <option>Fireplace Tile</option>
                            <option>Commercial Project</option>
                        </select>

                        <textarea name="message" rows="4" placeholder="Briefly describe your project vision..." 
                                  class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl p-5 text-white outline-none focus:border-blue-500 transition-all"></textarea>
                        
                        <button type="submit" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold uppercase tracking-widest hover:bg-blue-700 transition-all shadow-lg disabled:opacity-50" :disabled="loading">
                            <span x-show="!loading">Submit Request</span>
                            <span x-show="loading">Processing...</span>
                        </button>
                    </form>
                </div>

                <div x-show="submitted" class="text-center py-16 relative z-10" x-cloak>
                    <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-600/20 text-blue-500 text-5xl rounded-full mb-6">✓</div>
                    <h3 class="text-3xl font-bold uppercase mb-4 tracking-tighter">Message Sent</h3>
                    <p class="text-slate-400 text-lg mb-8">We'll reach out to you within 24 hours.</p>
                    <button @click="submitted = false" class="text-blue-500 font-bold uppercase text-xs tracking-widest hover:underline">Send another message</button>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-12 text-center border-t border-slate-100 bg-white">
        <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.5em]">&copy; 2026 True Craft Tile & Stone</p>
    </footer>

    <div x-show="activeProject && !fullscreenPhoto" x-cloak class="fixed inset-0 z-[100] bg-slate-950/95 backdrop-blur-xl flex flex-col">
        <div class="flex justify-between items-center p-8 border-b border-white/10">
            <h2 class="text-white text-3xl font-bold" x-text="activeProject?.title"></h2>
            <button @click="closeProject()" class="text-white/50 text-5xl leading-none">&times;</button>
        </div>
        <div class="flex-1 overflow-y-auto p-8 flex flex-wrap gap-6 justify-center">
            <template x-for="(img, index) in activeProject?.images" :key="index">
                <div @click="fullscreenPhoto = img; activePhotoIndex = index" 
                     class="w-full sm:w-[calc(50%-1.5rem)] lg:w-[calc(33.333%-1.5rem)] aspect-square rounded-2xl overflow-hidden cursor-pointer hover:ring-4 ring-blue-500 transition-all relative shadow-lg">
                    <img :src="img" class="w-full h-full object-cover block">
                </div>
            </template>
        </div>
    </div>

    <div x-show="fullscreenPhoto" x-cloak class="fixed inset-0 z-[110] bg-black flex flex-col">
        <div class="flex justify-between items-center p-6 bg-black/50 border-b border-white/5">
            <span class="text-white font-bold text-sm" x-text="`${activePhotoIndex + 1} / ${activeProject?.images.length}`"></span>
            <button @click="fullscreenPhoto = null" class="text-white/60 hover:text-white text-xs font-bold uppercase tracking-widest bg-white/10 px-4 py-2 rounded-lg">Back to Project</button>
        </div>
        <div class="relative flex-1 flex items-center justify-center p-4">
            <button @click="activePhotoIndex = (activePhotoIndex - 1 + activeProject.images.length) % activeProject.images.length; fullscreenPhoto = activeProject.images[activePhotoIndex]"
                    class="absolute left-6 z-50 bg-white/20 backdrop-blur-md text-white w-14 h-14 rounded-full flex items-center justify-center border border-white/20 hover:bg-blue-600 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <img :src="fullscreenPhoto" class="max-h-[80vh] max-w-full rounded-xl object-contain shadow-2xl">
            <button @click="activePhotoIndex = (activePhotoIndex + 1) % activeProject.images.length; fullscreenPhoto = activeProject.images[activePhotoIndex]"
                    class="absolute right-6 z-50 bg-white/20 backdrop-blur-md text-white w-14 h-14 rounded-full flex items-center justify-center border border-white/20 hover:bg-blue-600 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </div>
    </div>
</body>
