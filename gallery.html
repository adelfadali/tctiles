<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <title>Master Portfolio | True Craft Tile & Stone</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />

    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        [x-cloak] { display: none !important; }

        /* True Craft Signature Grid Animation */
        @keyframes moveGrid { from { background-position: 0px 0px; } to { background-position: 24px 24px; } }
        .moving-grid { animation: moveGrid 3s linear infinite; }
        
        .project-card { transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1); }
        .project-card:hover { transform: translateY(-12px); }

        /* Floating Button Glow */
        .pulse-blue { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(37, 99, 235, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
        }

        /* Hide horizontal scrollbar for filter tray */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Prevent image ghosting */
        img { -webkit-user-drag: none; user-select: none; }
    </style>
</head>
<body class="bg-white text-slate-900" 
      x-data="{ 
        navOpen: false,
        category: 'all',
        activeProject: null,
        fullscreenPhoto: null,
        activePhotoIndex: 0,
        search: '',
        
        projects: [
            {
                id: 1,
                title: 'Premium Kitchen Backsplash',
                location: 'Shakopee, MN',
                category: 'kitchens',
                images: [
                    'kitchen backsplash 0000 Shakopee Minneapolis Tile contractor.jpg',
                    'kitchen backsplash 000 Shakopee Minneapolis Tile contractor.jpg',
                    'kitchen backsplash 00 Shakopee Minneapolis Tile contractor.jpg',
                    'kitchen backsplash 0 Shakopee Minneapolis Tile contractor.jpg',
                    'kitchen backsplash 44Shakopee Minneapolis Tile contractor.jpg',
                    'kitchen backsplash 444Shakopee Minneapolis Tile contractor.jpg'
                ]
            },
            {
                id: 2,
                title: 'Custom Walk-in Showers',
                location: 'Minneapolis, MN',
                category: 'showers',
                images: [
                    'kitchen backsplash 2 Shakopee Minneapolis Tile contractor.jpg',
                    'kitchen backsplash 3 Shakopee Minneapolis Tile contractor.jpg'
                ]
            },
            {
                id: 3,
                title: 'Large Format Flooring',
                location: 'Prior Lake, MN',
                category: 'floorings',
                images: [
                    'kitchen backsplash 4 Shakopee Minneapolis Tile contractor.jpg',
                    'kitchen backsplash 5 Shakopee Minneapolis Tile contractor.jpg'
                ]
            }
        ],

        get filteredProjects() {
            return this.projects.filter(p => {
                const matchCat = this.category === 'all' || p.category === this.category;
                const matchSearch = p.title.toLowerCase().includes(this.search.toLowerCase()) || 
                                    p.location.toLowerCase().includes(this.search.toLowerCase());
                return matchCat && matchSearch;
            });
        },
        openProject(project) {
            this.activeProject = project;
            document.body.style.overflow = 'hidden';
        },
        closeProject() {
            this.activeProject = null;
            this.fullscreenPhoto = null;
            document.body.style.overflow = 'auto';
        }
      }">

    <a href="#contact-form" class="fixed bottom-8 right-8 z-[60] bg-blue-600 text-white px-8 py-4 rounded-full font-black shadow-2xl pulse-blue flex items-center gap-3 hover:bg-blue-700 transition-all hover:scale-105 active:scale-95">
        <span class="text-xs uppercase tracking-widest">Start My Project</span>
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
    </a>

    <nav class="fixed w-full z-50 bg-white/95 backdrop-blur-md border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 py-3 flex justify-between items-center">
            <a href="index.html#home" class="flex items-center gap-3">
                <img src="TC tile.jpg" class="h-14 w-auto" alt="True Craft Logo" />
                <span class="font-black text-xl tracking-tighter text-slate-900 hidden md:block">True Craft <span class="text-blue-600">Tile & Stone</span></span>
            </a>

            <div class="hidden lg:flex items-center space-x-10 font-bold text-[10px] uppercase tracking-[0.2em] text-slate-400">
                <a href="index.html#home" class="hover:text-blue-600 transition">Home</a>
                <a href="gallery.html" class="text-blue-600 border-b-2 border-blue-600 pb-1">Gallery</a>
                <a href="index.html#services" class="hover:text-blue-600 transition">Services</a>
                <a href="tel:9524860554" class="bg-slate-950 text-white px-6 py-3 rounded-xl hover:bg-blue-600 transition shadow-xl">952-486-0554</a>
            </div>

            <button @click="navOpen = !navOpen" class="lg:hidden p-2 text-slate-900"><svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg></button>
        </div>

        <div class="lg:hidden bg-white border-t border-slate-100" x-show="navOpen" x-transition x-cloak>
            <div class="flex flex-col space-y-1 px-8 py-10 font-black text-sm uppercase tracking-widest">
                <a href="index.html#home" class="py-4 border-b border-slate-50">Home</a>
                <a href="gallery.html" class="py-4 border-b border-slate-50 text-blue-600">Gallery</a>
                <a href="index.html#services" class="py-4 border-b border-slate-50">Services</a>
                <a href="tel:9524860554" class="mt-6 bg-blue-600 text-white text-center py-5 rounded-2xl">Call Now</a>
            </div>
        </div>
    </nav>

    <header class="relative pt-48 pb-28 bg-slate-950 overflow-hidden text-center">
        <div class="absolute inset-0 bg-[size:24px_24px] moving-grid opacity-20" style="background-image: linear-gradient(to right, #80808012 1px, transparent 1px), linear-gradient(to bottom, #80808012 1px, transparent 1px);"></div>
        <div class="relative z-10 max-w-7xl mx-auto px-6">
            <h1 class="text-6xl md:text-9xl font-black text-white mb-8 tracking-tighter uppercase italic">The <span class="text-blue-600">Portfolio</span></h1>
            <div class="max-w-xl mx-auto relative">
                <input type="text" x-model="search" placeholder="Search by city or style..." 
                       class="w-full bg-slate-900/60 border border-slate-700 rounded-2xl py-6 px-10 text-white outline-none focus:border-blue-500 transition-all backdrop-blur-md text-lg">
                <svg class="absolute right-6 top-1/2 -translate-y-1/2 w-6 h-6 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
        </div>
    </header>

    <section class="sticky top-[79px] z-40 bg-white/95 backdrop-blur-md border-b border-slate-100 py-6">
        <div class="max-w-7xl mx-auto px-6 overflow-x-auto no-scrollbar">
            <div class="flex flex-nowrap md:flex-wrap gap-4 justify-start md:justify-center">
                <template x-for="cat in ['all', 'kitchens', 'showers', 'floorings', 'fireplace', 'commercial']">
                    <button @click="category = cat" 
                            :class="category === cat 
                                ? 'bg-blue-600 text-white border-blue-600 shadow-xl shadow-blue-200 scale-105' 
                                : 'bg-white text-slate-500 border-slate-200 hover:border-blue-400 hover:text-blue-600 hover:bg-blue-50'"
                            class="px-8 py-3.5 rounded-2xl font-black uppercase text-[11px] tracking-[0.15em] border transition-all duration-300 whitespace-nowrap">
                        <span x-text="cat"></span>
                    </button>
                </template>
            </div>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-6 py-24">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
            <template x-for="project in filteredProjects" :key="project.id">
                <div class="project-card group cursor-pointer" @click="openProject(project)">
                    <div class="relative aspect-[4/5] overflow-hidden rounded-[3rem] shadow-2xl border border-slate-100 bg-slate-50">
                        <img :src="project.images[0]" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-900/20 to-transparent p-12 flex flex-col justify-end">
                            <h3 class="text-white text-3xl font-black italic tracking-tighter" x-text="project.title"></h3>
                            <div class="flex items-center gap-2 mt-2">
                                <span class="w-8 h-[2px] bg-blue-600"></span>
                                <p class="text-blue-500 font-black uppercase text-[10px] tracking-widest" x-text="project.location"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <div x-show="activeProject && !fullscreenPhoto" x-cloak class="fixed inset-0 z-[100] bg-slate-950/98 backdrop-blur-2xl flex flex-col transition-all">
        <div class="flex justify-between items-center p-10 border-b border-white/5 bg-slate-900/30">
            <div>
                <p class="text-blue-600 font-black uppercase text-[10px] tracking-widest mb-1">Project View</p>
                <h2 class="text-white text-4xl font-black italic tracking-tighter" x-text="activeProject?.title"></h2>
            </div>
            <button @click="closeProject()" class="text-white/40 hover:text-white text-6xl font-light leading-none transition-all">&times;</button>
        </div>
        <div class="flex-1 overflow-y-auto p-10 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <template x-for="(img, index) in activeProject?.images" :key="index">
                <div @click="fullscreenPhoto = img; activePhotoIndex = index" class="aspect-square rounded-3xl overflow-hidden cursor-pointer hover:ring-8 ring-blue-600 transition-all group relative">
                    <img :src="img" class="w-full h-full object-cover group-hover:scale-105 transition-all">
                    <div class="absolute inset-0 bg-blue-600/20 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center">
                        <span class="text-white font-black text-xs uppercase tracking-widest">View Full Size</span>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <div x-show="fullscreenPhoto" x-cloak class="fixed inset-0 z-[110] bg-black flex flex-col">
        <div class="flex justify-between items-center p-6 bg-black/80 border-b border-white/5">
            <span class="text-white/50 font-black text-xs uppercase tracking-widest" x-text="`${activePhotoIndex + 1} / ${activeProject?.images.length}`"></span>
            <button @click="fullscreenPhoto = null" class="text-white font-black text-[10px] uppercase tracking-widest bg-blue-600 px-6 py-3 rounded-full hover:bg-blue-700">Back to Album</button>
        </div>

        <div class="relative flex-1 flex items-center justify-center p-4">
            <button @click="activePhotoIndex = (activePhotoIndex - 1 + activeProject.images.length) % activeProject.images.length; fullscreenPhoto = activeProject.images[activePhotoIndex]"
                    class="absolute left-8 z-[120] bg-white/10 backdrop-blur-xl hover:bg-blue-600 text-white w-16 h-16 rounded-full flex items-center justify-center border border-white/10 transition-all shadow-2xl">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
            </button>

            <img :src="fullscreenPhoto" class="max-h-[85vh] max-w-[90vw] rounded-2xl shadow-[0_0_100px_rgba(0,0,0,0.5)] object-contain transition-all duration-500">

            <button @click="activePhotoIndex = (activePhotoIndex + 1) % activeProject.images.length; fullscreenPhoto = activeProject.images[activePhotoIndex]"
                    class="absolute right-8 z-[120] bg-white/10 backdrop-blur-xl hover:bg-blue-600 text-white w-16 h-16 rounded-full flex items-center justify-center border border-white/10 transition-all shadow-2xl">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </div>
    </div>

    <section id="contact-form" class="py-32 bg-slate-50 border-t border-slate-200">
        <div class="max-w-4xl mx-auto px-6 text-center">
            <h2 class="text-5xl font-black text-slate-950 mb-4 tracking-tighter uppercase italic">Work With <span class="text-blue-600">The Best</span></h2>
            <p class="text-slate-500 mb-12 font-bold uppercase tracking-widest text-sm">Fill out the form to secure your project date.</p>
            
            <form class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-white p-12 rounded-[3.5rem] shadow-2xl border border-slate-100 text-left">
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-2">Name</label>
                    <input type="text" placeholder="Your Name" class="bg-slate-50 border border-slate-200 rounded-2xl p-5 outline-none focus:border-blue-600 transition-all font-bold">
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-2">Phone</label>
                    <input type="tel" placeholder="952-486-0554" class="bg-slate-50 border border-slate-200 rounded-2xl p-5 outline-none focus:border-blue-600 transition-all font-bold">
                </div>
                <div class="flex flex-col gap-2 md:col-span-2">
                    <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-2">Details</label>
                    <textarea rows="4" placeholder="Briefly describe your tile or stone project..." class="bg-slate-50 border border-slate-200 rounded-2xl p-5 outline-none focus:border-blue-600 transition-all font-bold"></textarea>
                </div>
                <button type="submit" class="md:col-span-2 bg-slate-950 text-white py-6 rounded-2xl font-black uppercase tracking-[0.3em] hover:bg-blue-600 transition-all shadow-2xl">
                    Submit Project Request
                </button>
            </form>
        </div>
    </section>

    <footer class="py-20 text-center border-t border-slate-100 bg-white">
        <img src="TC tile.jpg" class="h-10 mx-auto mb-6 opacity-30 grayscale" alt="Logo Footer" />
        <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.6em]">&copy; 2026 True Craft Tile & Stone. Minneapolis / St. Paul</p>
    </footer>

</body>
</html>
