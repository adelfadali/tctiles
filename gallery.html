<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <title>Master Portfolio | True Craft Tile & Stone</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />

    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        [x-cloak] { display: none !important; }

        @keyframes moveGrid { from { background-position: 0px 0px; } to { background-position: 24px 24px; } }
        .moving-grid { animation: moveGrid 3s linear infinite; }
        
        .project-card { transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1); }
        .project-card:hover { transform: translateY(-10px); }

        .pulse-blue { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
    </style>
</head>
<body class="bg-white text-slate-900" 
      x-data="{ 
        navOpen: false,
        category: 'all',
        activeProject: null,
        fullscreenPhoto: null,
        activePhotoIndex: 0,
        search: '',
        
        projects: [
            {
                id: 1,
                title: 'Premium Kitchen Backsplash',
                location: 'Shakopee, MN',
                category: 'kitchens',
                images: [
                    'kitchen backsplash 0000 Shakopee Minneapolis Tile contractor.jpg',
                    'kitchen backsplash 000 Shakopee Minneapolis Tile contractor.jpg',
                    'kitchen backsplash 00 Shakopee Minneapolis Tile contractor.jpg',
                    'kitchen backsplash 0 Shakopee Minneapolis Tile contractor.jpg',
                    'kitchen backsplash 44Shakopee Minneapolis Tile contractor.jpg',
                    'kitchen backsplash 444Shakopee Minneapolis Tile contractor.jpg'
                ]
            },
            {
                id: 2,
                title: 'Custom Walk-in Showers',
                location: 'Minneapolis, MN',
                category: 'showers',
                images: [
                    'kitchen backsplash 2 Shakopee Minneapolis Tile contractor.jpg',
                    'kitchen backsplash 3 Shakopee Minneapolis Tile contractor.jpg'
                ]
            },
            {
                id: 3,
                title: 'Large Format Flooring',
                location: 'Prior Lake, MN',
                category: 'floorings',
                images: [
                    'kitchen backsplash 4 Shakopee Minneapolis Tile contractor.jpg',
                    'kitchen backsplash 5 Shakopee Minneapolis Tile contractor.jpg'
                ]
            }
        ],

        get filteredProjects() {
            return this.projects.filter(p => {
                const matchCat = this.category === 'all' || p.category === this.category;
                const matchSearch = p.title.toLowerCase().includes(this.search.toLowerCase()) || 
                                    p.location.toLowerCase().includes(this.search.toLowerCase());
                return matchCat && matchSearch;
            });
        },
        openProject(project) {
            this.activeProject = project;
            document.body.style.overflow = 'hidden';
        },
        closeProject() {
            this.activeProject = null;
            this.fullscreenPhoto = null;
            document.body.style.overflow = 'auto';
        }
      }">

    <a href="#contact-form" class="fixed bottom-8 right-8 z-[60] bg-blue-600 text-white px-6 py-4 rounded-full font-bold shadow-2xl pulse-blue flex items-center gap-3 hover:bg-blue-700 transition-all">
        <span class="text-xs uppercase tracking-widest">Start My Project</span>
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
    </a>

    <nav class="fixed w-full z-50 bg-white/95 backdrop-blur-md border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 py-3 flex justify-between items-center">
            <a href="index.html#home" class="flex items-center gap-3">
                <img src="TC tile.jpg" class="h-14 w-auto" alt="Logo" />
                <span class="font-bold text-lg tracking-tighter text-slate-900 hidden sm:block">True Craft Tile & Stone</span>
            </a>
            <div class="hidden lg:flex items-center space-x-8 font-bold text-xs uppercase tracking-widest text-slate-500">
                <a href="index.html#home" class="hover:text-blue-700 transition">Home</a>
                <a href="gallery.html" class="text-blue-700 border-b-2 border-blue-700 pb-1">Gallery</a>
                <a href="index.html#services" class="hover:text-blue-700 transition">Services</a>
                <a href="tel:9524860554" class="bg-slate-900 text-white px-5 py-2.5 rounded-lg hover:bg-blue-600 transition">Call Now</a>
            </div>
            <button @click="navOpen = !navOpen" class="lg:hidden p-2 text-slate-700"><svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg></button>
        </div>
    </nav>

    <header class="relative pt-48 pb-28 bg-slate-950 overflow-hidden text-center">
        <div class="absolute inset-0 bg-[size:24px_24px] moving-grid opacity-10" style="background-image: linear-gradient(to right, #80808012 1px, transparent 1px), linear-gradient(to bottom, #80808012 1px, transparent 1px);"></div>
        <div class="relative z-10 max-w-7xl mx-auto px-6">
            <h1 class="text-6xl md:text-8xl font-bold text-white mb-8 tracking-tighter">Master <span class="text-blue-500">Portfolio</span></h1>
            <input type="text" x-model="search" placeholder="Search by city..." class="max-w-xl w-full bg-slate-800/50 border border-slate-700 rounded-2xl py-5 px-8 text-white outline-none focus:border-blue-500 transition-all">
        </div>
    </header>

    <section class="sticky top-[75px] z-40 bg-white/95 backdrop-blur-md border-b border-slate-100 py-6">
        <div class="max-w-7xl mx-auto px-6 flex flex-wrap gap-3 justify-center">
            <template x-for="cat in ['all', 'kitchens', 'showers', 'floorings', 'fireplace', 'commercial']">
                <button @click="category = cat" 
                        :class="category === cat ? 'bg-blue-600 text-white border-blue-600' : 'bg-slate-50 text-slate-400 border-slate-200'"
                        class="px-6 py-2.5 rounded-xl font-bold uppercase text-[10px] tracking-widest border transition-all">
                    <span x-text="cat"></span>
                </button>
            </template>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-6 py-20">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <template x-for="project in filteredProjects" :key="project.id">
                <div class="project-card group cursor-pointer" @click="openProject(project)">
                    <div class="relative aspect-[4/5] overflow-hidden rounded-[2.5rem] shadow-2xl border border-slate-100 bg-slate-50">
                        <img :src="project.images[0]" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-transparent to-transparent p-10 flex flex-col justify-end">
                            <h3 class="text-white text-2xl font-bold" x-text="project.title"></h3>
                            <p class="text-blue-500 font-bold uppercase text-[10px] tracking-widest mt-1" x-text="project.location"></p>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <div x-show="activeProject && !fullscreenPhoto" x-cloak class="fixed inset-0 z-[100] bg-slate-950/95 backdrop-blur-xl flex flex-col">
        <div class="flex justify-between items-center p-8 border-b border-white/10">
            <h2 class="text-white text-3xl font-bold" x-text="activeProject?.title"></h2>
            <button @click="closeProject()" class="text-white/50 text-5xl leading-none">&times;</button>
        </div>
        <div class="flex-1 overflow-y-auto p-8 flex flex-wrap gap-6 justify-center">
            <template x-for="(img, index) in activeProject?.images" :key="index">
                <div @click="fullscreenPhoto = img; activePhotoIndex = index" 
                     class="w-full sm:w-[calc(50%-1.5rem)] lg:w-[calc(33.333%-1.5rem)] aspect-square rounded-2xl overflow-hidden cursor-pointer hover:ring-4 ring-blue-500 transition-all relative shadow-lg">
                    <img :src="img" class="w-full h-full object-cover block">
                </div>
            </template>
        </div>
    </div>

    <div x-show="fullscreenPhoto" x-cloak class="fixed inset-0 z-[110] bg-black flex flex-col">
        <div class="flex justify-between items-center p-6 bg-black/50 border-b border-white/5">
            <span class="text-white font-bold text-sm" x-text="`${activePhotoIndex + 1} / ${activeProject?.images.length}`"></span>
            <button @click="fullscreenPhoto = null" class="text-white/60 hover:text-white text-xs font-bold uppercase tracking-widest bg-white/10 px-4 py-2 rounded-lg">Back to Project</button>
        </div>

        <div class="relative flex-1 flex items-center justify-center p-4">
            <button @click="activePhotoIndex = (activePhotoIndex - 1 + activeProject.images.length) % activeProject.images.length; fullscreenPhoto = activeProject.images[activePhotoIndex]"
                    class="absolute left-6 z-50 bg-white/20 backdrop-blur-md text-white w-14 h-14 rounded-full flex items-center justify-center border border-white/20 hover:bg-blue-600 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
            </button>

            <img :src="fullscreenPhoto" class="max-h-[80vh] max-w-full rounded-xl object-contain shadow-2xl">

            <button @click="activePhotoIndex = (activePhotoIndex + 1) % activeProject.images.length; fullscreenPhoto = activeProject.images[activePhotoIndex]"
                    class="absolute right-6 z-50 bg-white/20 backdrop-blur-md text-white w-14 h-14 rounded-full flex items-center justify-center border border-white/20 hover:bg-blue-600 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </div>
    </div>

    <section id="contact-form" class="py-24 bg-slate-50 border-t border-slate-200">
        <div class="max-w-4xl mx-auto px-6 text-center">
            <h2 class="text-4xl font-bold text-slate-900 mb-4">Start Your Project</h2>
            <form class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-white p-10 rounded-[2.5rem] shadow-xl border border-slate-100 text-left mt-10">
                <input type="text" placeholder="Full Name" class="bg-slate-50 border border-slate-200 rounded-xl p-5 outline-none focus:border-blue-500">
                <input type="tel" placeholder="Phone Number" class="bg-slate-50 border border-slate-200 rounded-xl p-5 outline-none focus:border-blue-500">
                <textarea rows="4" placeholder="Describe your project..." class="md:col-span-2 bg-slate-50 border border-slate-200 rounded-xl p-5 outline-none focus:border-blue-500"></textarea>
                <button type="submit" class="md:col-span-2 bg-blue-600 text-white py-5 rounded-2xl font-bold uppercase tracking-widest hover:bg-blue-700 transition-all shadow-lg">Submit Request</button>
            </form>
        </div>
    </section>

    <footer class="py-12 text-center border-t border-slate-100 bg-white">
        <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.5em]">&copy; 2026 True Craft Tile & Stone</p>
    </footer>
</body>
</html>
