<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <title>Master Portfolio | True Craft Tile & Stone</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet" />

    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #fcfaf8; color: #1a1a1a; }
        h1, h2, h3 { font-family: 'Cormorant Garamond', serif; }
        [x-cloak] { display: none !important; }
        
        /* Subtle transition for the project cards */
        .card-shadow { box-shadow: 0 20px 40px -15px rgba(0,0,0,0.05); transition: all 0.5s ease; }
        .card-shadow:hover { box-shadow: 0 40px 60px -20px rgba(0,0,0,0.15); transform: translateY(-5px); }

        /* Masonry Grid Logic */
        .masonry-grid { column-count: 1; column-gap: 2rem; }
        @media (min-width: 768px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 3; } }
    </style>
</head>
<body x-data="{ 
    navOpen: false, 
    category: 'all', 
    activeProject: null, 
    activePhotoIndex: 0,
    projects: [
        { id: 1, title: 'Old World Kitchen', loc: 'Shakopee', cat: 'kitchens', imgs: ['kitchen-1.jpg', 'kitchen-2.jpg'] },
        { id: 2, id: 2, title: 'Natural Stone Bath', loc: 'Minneapolis', cat: 'showers', imgs: ['shower-1.jpg'] },
        { id: 3, title: 'Modern Hearth', loc: 'Prior Lake', cat: 'fireplace', imgs: ['fire-1.jpg'] }
    ]
}">

    <nav class="fixed w-full z-50 bg-white/80 backdrop-blur-md border-b border-stone-100">
        <div class="max-w-7xl mx-auto px-8 py-6 flex justify-between items-center">
            <a href="index.html" class="flex flex-col">
                <span class="text-2xl font-bold tracking-[0.2em] uppercase text-stone-800">True Craft</span>
                <span class="text-[10px] tracking-[0.4em] uppercase text-stone-400">Tile & Stone</span>
            </a>
            
            <div class="hidden lg:flex items-center space-x-12 text-[10px] font-bold uppercase tracking-[0.2em]">
                <a href="index.html" class="hover:text-stone-400 transition">Home</a>
                <a href="gallery.html" class="text-stone-900 border-b border-stone-900 pb-1">Portfolio</a>
                <a href="index.html#services" class="hover:text-stone-400 transition">Services</a>
                <a href="tel:9524860554" class="text-stone-400">952.486.0554</a>
            </div>

            <button @click="navOpen = !navOpen" class="lg:hidden text-stone-800">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 8h16M4 16h16" stroke-width="1.5"/></svg>
            </button>
        </div>
    </nav>

    <header class="pt-40 pb-20 px-8">
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="text-6xl md:text-8xl text-stone-800 mb-6">Master Portfolio</h1>
            <div class="h-px w-24 bg-stone-200 mx-auto mb-8"></div>
            <p class="text-stone-500 font-light italic text-xl">Curated collections of premium stone and tile craftsmanship.</p>
        </div>
    </header>

    <div class="sticky top-[80px] z-40 bg-[#fcfaf8]/90 backdrop-blur-sm py-8">
        <div class="max-w-7xl mx-auto px-8">
            <div class="flex flex-wrap justify-center gap-4">
                <template x-for="c in ['all', 'kitchens', 'showers', 'floorings', 'fireplace', 'commercial', 'custom']">
                    <button @click="category = c" 
                            :class="category === c ? 'bg-stone-800 text-white' : 'bg-white text-stone-400 hover:text-stone-800'"
                            class="px-8 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest border border-stone-100 transition-all shadow-sm"
                            x-text="c"></button>
                </template>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-8 py-12">
        <div class="masonry-grid">
            <template x-for="p in projects.filter(i => category === 'all' || i.cat === category)">
                <div class="break-inside-avoid mb-8 group cursor-pointer" @click="activeProject = p; activePhotoIndex = 0">
                    <div class="relative card-shadow overflow-hidden bg-white p-4">
                        <img :src="p.imgs[0]" class="w-full grayscale group-hover:grayscale-0 transition-all duration-1000">
                        <div class="mt-6 flex justify-between items-end">
                            <div>
                                <h3 class="text-2xl text-stone-800" x-text="p.title"></h3>
                                <p class="text-[10px] uppercase tracking-widest text-stone-400 mt-1" x-text="p.loc"></p>
                            </div>
                            <span class="text-[10px] font-bold text-stone-300" x-text="p.imgs.length + ' Photos'"></span>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <div x-show="activeProject" x-cloak class="fixed inset-0 z-[100] flex flex-col bg-white overflow-hidden">
        <div class="flex justify-between items-center p-8 border-b border-stone-50">
            <div class="flex flex-col">
                <span class="text-[10px] uppercase tracking-widest text-stone-400" x-text="activeProject?.cat"></span>
                <h2 class="text-2xl text-stone-800" x-text="activeProject?.title"></h2>
            </div>
            <button @click="activeProject = null" class="text-stone-300 hover:text-stone-800 text-4xl font-light">&times;</button>
        </div>

        <div class="flex-1 relative flex items-center justify-center p-4 bg-[#fcfaf8]">
            <button @click="activePhotoIndex = (activePhotoIndex - 1 + activeProject.imgs.length) % activeProject.imgs.length" 
                    class="hidden md:block absolute left-12 text-stone-200 hover:text-stone-800 text-6xl font-light">‹</button>
            
            <img :src="activeProject?.imgs[activePhotoIndex]" 
                 class="max-h-full max-w-full shadow-2xl object-contain transition-all duration-500"
                 style="touch-action: pinch-zoom;">

            <button @click="activePhotoIndex = (activePhotoIndex + 1) % activeProject.imgs.length" 
                    class="hidden md:block absolute right-12 text-stone-200 hover:text-stone-800 text-6xl font-light">›</button>
        </div>

        <div class="md:hidden flex justify-between p-8 border-t border-stone-50 bg-white">
            <button @click="activePhotoIndex = (activePhotoIndex - 1 + activeProject.imgs.length) % activeProject.imgs.length" class="uppercase text-[10px] font-bold tracking-widest text-stone-400">Prev</button>
            <span class="text-[10px] font-bold text-stone-800" x-text="(activePhotoIndex + 1) + ' / ' + activeProject?.imgs.length"></span>
            <button @click="activePhotoIndex = (activePhotoIndex + 1) % activeProject.imgs.length" class="uppercase text-[10px] font-bold tracking-widest text-stone-900">Next</button>
        </div>
    </div>

    <footer class="py-20 text-center border-t border-stone-100">
        <p class="text-[10px] uppercase tracking-[0.5em] text-stone-300">&copy; 2026 True Craft Tile & Stone</p>
    </footer>

</body>
</html>
