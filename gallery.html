<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gallery | True Craft Tile & Stone - 1000+ Projects</title>
    <meta name="description" content="Explore 1000+ premium tile installations by True Craft Tile & Stone. Kitchen backsplashes, custom showers, flooring masterpieces in Shakopee & Minneapolis.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .gallery-item { transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .gallery-item:hover { transform: translateY(-12px) scale(1.02) !important; }
        [x-cloak] { display: none !important; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeInUp { animation: fadeInUp 0.8s ease forwards; }
        .category-chip { transition: all 0.3s ease; }
        .category-chip.active { transform: scale(1.05); box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-white to-slate-100 text-slate-900 overflow-x-hidden" 
      x-data="{
        activeLightbox: false,
        currentImage: 0,
        category: 'all',
        search: '',
        allImages: [
            { src: 'kitchen backsplash 0000 Shakopee Minneapolis Tile contractor.jpg', category: 'kitchen', title: 'Modern Herringbone Backsplash', location: 'Shakopee' },
            { src: 'kitchen backsplash 000 Shakopee Minneapolis Tile contractor.jpg', category: 'kitchen', title: 'Classic Subway Tile', location: 'Minneapolis' },
            { src: 'kitchen backsplash 00 Shakopee Minneapolis Tile contractor.jpg', category: 'kitchen', title: 'Contemporary Mosaic Design', location: 'Bloomington' },
            { src: 'kitchen backsplash 0 Shakopee Minneapolis Tile contractor.jpg', category: 'kitchen', title: 'Custom Porcelain Installation', location: 'Shakopee' },
            { src: 'kitchen backsplash 2 Shakopee Minneapolis Tile contractor.jpg', category: 'shower', title: 'Schluter Shower System', location: 'Minneapolis' },
            { src: 'kitchen backsplash 3 Shakopee Minneapolis Tile contractor.jpg', category: 'shower', title: 'Luxury Walk-in Shower', location: 'Prior Lake' },
            { src: 'kitchen backsplash 4 Shakopee Minneapolis Tile contractor.jpg', category: 'flooring', title: 'Large Format Floor Tile', location: 'Shakopee' },
            { src: 'kitchen backsplash 5 Shakopee Minneapolis Tile contractor.jpg', category: 'flooring', title: 'Natural Stone Flooring', location: 'Eden Prairie' },
            { src: 'kitchen backsplash 44Shakopee Minneapolis Tile contractor.jpg', category: 'kitchen', title: 'High-End Kitchen Detail', location: 'Minneapolis' },
            { src: 'kitchen backsplash 444Shakopee Minneapolis Tile contractor.jpg', category: 'kitchen', title: 'Master Craftsmanship', location: 'Shakopee' }
        ],
        get filteredImages() {
            return this.allImages.filter(img => {
                const matchCategory = this.category === 'all' || img.category === this.category;
                const matchSearch = img.title.toLowerCase().includes(this.search.toLowerCase()) || 
                                    img.location.toLowerCase().includes(this.search.toLowerCase());
                return matchCategory && matchSearch;
            });
        },
        openLightbox(index) { 
            this.currentImage = index; 
            this.activeLightbox = true; 
        },
        nextImage() { this.currentImage = (this.currentImage + 1) % this.filteredImages.length; },
        prevImage() { this.currentImage = (this.currentImage - 1 + this.filteredImages.length) % this.filteredImages.length; }
      }" x-init="$nextTick(() => {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('animate-fadeInUp'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.gallery-item').forEach(el => observer.observe(el));
      })">

    <nav class="fixed w-full z-50 bg-white/95 backdrop-blur-md border-b border-slate-100 shadow-lg">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3 group">
                <img src="TC tile.jpg" class="h-14 w-auto transition-transform group-hover:scale-110" alt="True Craft Logo">
                <span class="font-bold text-xl tracking-tighter text-slate-900 hidden lg:block">True Craft Tile & Stone</span>
            </a>
            
            <div class="hidden lg:flex items-center space-x-8 font-bold text-sm uppercase tracking-widest text-slate-500">
                <a href="index.html" class="hover:text-blue-700 transition">Home</a>
                <a href="gallery.html" class="text-blue-900 border-b-2 border-blue-700 pb-1 font-black">Gallery</a>
                <a href="index.html#services" class="hover:text-blue-700 transition">Services</a>
                <a href="index.html#work" class="hover:text-blue-700 transition">Contact</a>
            </div>
            
            <a href="tel:9524860554" class="hidden md:flex items-center gap-2 bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold uppercase text-sm hover:bg-blue-700 transition-all shadow-lg">
                Call Now
            </a>
        </div>
    </nav>

    <section class="relative min-h-[60vh] flex items-center justify-center overflow-hidden bg-gradient-to-br from-slate-900 via-slate-800 to-blue-900 text-white pt-24">
        <div class="max-w-7xl mx-auto px-6 text-center relative z-10">
            <h1 class="text-5xl md:text-7xl font-black mb-6">Master <span class="text-blue-400">Gallery</span></h1>
            <p class="text-xl md:text-2xl text-slate-200 mb-10 max-w-2xl mx-auto">Hand-crafted tile excellence across the Twin Cities.</p>
            
            <div class="max-w-md mx-auto relative">
                <input type="text" x-model="search" placeholder="Search by city or project..." 
                       class="w-full px-8 py-5 bg-white/10 backdrop-blur-xl border border-white/20 rounded-full text-white placeholder-slate-300 focus:outline-none focus:border-blue-400 transition-all">
            </div>
        </div>
    </section>

    <section class="py-12 px-6 max-w-7xl mx-auto">
        <div class="flex flex-wrap gap-4 justify-center mb-16">
            <template x-for="cat in ['all', 'kitchen', 'shower', 'flooring', 'fireplace', 'commercial']">
                <button @click="category = cat" 
                        :class="category === cat ? 'bg-blue-600 text-white active category-chip' : 'bg-white text-slate-700 border-slate-200 category-chip'"
                        class="px-8 py-4 rounded-full font-bold uppercase text-xs tracking-widest border-2 transition-all hover:shadow-lg">
                    <span x-text="cat === 'all' ? 'All Work' : cat"></span>
                </button>
            </template>
        </div>

        <div class="columns-1 sm:columns-2 lg:columns-3 gap-8">
            <template x-for="(image, index) in filteredImages" :key="index">
                <div class="gallery-item break-inside-avoid mb-8 opacity-0">
                    <div @click="openLightbox(index)" class="group cursor-pointer overflow-hidden rounded-3xl shadow-xl bg-white relative">
                        <img :src="image.src" :alt="image.title" class="w-full object-cover group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-all duration-300 flex flex-col justify-end p-6">
                            <h3 class="text-white font-bold text-lg" x-text="image.title"></h3>
                            <p class="text-blue-300 text-sm" x-text="image.location"></p>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <div x-show="filteredImages.length === 0" class="text-center py-20" x-cloak>
            <h2 class="text-2xl font-bold text-slate-400">No projects found in this category.</h2>
            <button @click="category='all'; search=''" class="mt-4 text-blue-600 underline">View All Projects</button>
        </div>
    </section>

    <div x-show="activeLightbox" x-cloak class="fixed inset-0 z-[100] flex items-center justify-center bg-black/95 p-4" 
         @keydown.escape.window="activeLightbox = false">
        <button @click="activeLightbox = false" class="absolute top-8 right-8 text-white text-5xl">&times;</button>
        <button @click="prevImage()" class="absolute left-4 top-1/2 text-white text-6xl hover:text-blue-400 transition">‹</button>
        <button @click="nextImage()" class="absolute right-4 top-1/2 text-white text-6xl hover:text-blue-400 transition">›</button>
        
        <div class="max-w-5xl text-center">
            <img :src="filteredImages[currentImage]?.src" class="max-h-[80vh] mx-auto rounded-lg shadow-2xl">
            <div class="mt-6 text-white">
                <h2 class="text-2xl font-bold" x-text="filteredImages[currentImage]?.title"></h2>
                <p class="text-blue-400" x-text="filteredImages[currentImage]?.location"></p>
            </div>
        </div>
    </div>

</body>
</html>
