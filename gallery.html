<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Project Gallery | True Craft Tile & Stone</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />

    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        [x-cloak] { display: none !important; }

        /* Match Landing Page Animations */
        @keyframes moveGrid { from { background-position: 0px 0px; } to { background-position: 24px 24px; } }
        .moving-grid { animation: moveGrid 3s linear infinite; }
        
        .gallery-card { transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1); }
        .gallery-card:hover { transform: translateY(-10px); }

        /* Lightbox transitions */
        .fade-enter { opacity: 0; transform: scale(0.95); }
        .fade-enter-active { opacity: 1; transform: scale(1); transition: all 0.3s ease-out; }
    </style>
</head>
<body class="bg-white text-slate-900" 
      x-data="{ 
        navOpen: false,
        activeLightbox: undefined,
        category: 'all',
        search: '',
        allImages: [
            { src: 'kitchen backsplash 0000 Shakopee Minneapolis Tile contractor.jpg', category: 'kitchen', title: 'Modern Herringbone', location: 'Shakopee' },
            { src: 'kitchen backsplash 000 Shakopee Minneapolis Tile contractor.jpg', category: 'kitchen', title: 'Subway Tile Design', location: 'Minneapolis' },
            { src: 'kitchen backsplash 00 Shakopee Minneapolis Tile contractor.jpg', category: 'kitchen', title: 'Contemporary Mosaic', location: 'Bloomington' },
            { src: 'kitchen backsplash 0 Shakopee Minneapolis Tile contractor.jpg', category: 'kitchen', title: 'Custom Porcelain', location: 'Shakopee' },
            { src: 'kitchen backsplash 2 Shakopee Minneapolis Tile contractor.jpg', category: 'shower', title: 'Schluter Shower System', location: 'Minneapolis' },
            { src: 'kitchen backsplash 3 Shakopee Minneapolis Tile contractor.jpg', category: 'shower', title: 'Luxury Walk-in Shower', location: 'Prior Lake' },
            { src: 'kitchen backsplash 4 Shakopee Minneapolis Tile contractor.jpg', category: 'flooring', title: 'Large Format Floor', location: 'Shakopee' },
            { src: 'kitchen backsplash 5 Shakopee Minneapolis Tile contractor.jpg', category: 'flooring', title: 'Natural Stone Floor', location: 'Eden Prairie' },
            { src: 'kitchen backsplash 44Shakopee Minneapolis Tile contractor.jpg', category: 'kitchen', title: 'High-End Kitchen', location: 'Minneapolis' },
            { src: 'kitchen backsplash 444Shakopee Minneapolis Tile contractor.jpg', category: 'kitchen', title: 'Master Craftsmanship', location: 'Shakopee' }
        ],
        get filteredImages() {
            return this.allImages.filter(img => {
                const matchCat = this.category === 'all' || img.category === this.category;
                const matchSearch = img.title.toLowerCase().includes(this.search.toLowerCase()) || 
                                    img.location.toLowerCase().includes(this.search.toLowerCase());
                return matchCat && matchSearch;
            });
        },
        toggleNav() { this.navOpen = !this.navOpen; },
        closeNav() { this.navOpen = false; }
      }"
      x-init="$watch('category', () => { activeLightbox = undefined; }); $watch('search', () => { activeLightbox = undefined; })">

    <nav class="fixed w-full z-50 bg-white/95 backdrop-blur-md border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3">
                <img src="TC tile.jpg" class="h-14 w-auto" alt="Logo" />
                <span class="font-bold text-lg tracking-tighter text-slate-900 hidden sm:block">True Craft Tile & Stone</span>
            </a>

            <div class="hidden lg:flex items-center space-x-8 font-bold text-xs uppercase tracking-widest text-slate-500">
                <a href="index.html" class="hover:text-blue-700 transition">Home</a>
                <a href="gallery.html" class="text-blue-700 border-b-2 border-blue-700">Gallery</a>
                <a href="index.html#services" class="hover:text-blue-700 transition">Services</a>
                <a href="index.html#about" class="hover:text-blue-700 transition">About</a>
                <a href="tel:9524860554" class="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700 transition shadow-md shadow-blue-200">Call Now</a>
            </div>

            <button @click="toggleNav()" class="lg:hidden p-2 text-slate-700">
                <svg class="h-6 w-6 fill-current" viewBox="0 0 20 20">
                    <path x-show="!navOpen" d="M0 3h20v2H0V3zm0 6h20v2H0V9zm0 6h20v2H0v-2z"/>
                    <path x-show="navOpen" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 011.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"/>
                </svg>
            </button>
        </div>
    </nav>

    <header class="relative pt-40 pb-20 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 overflow-hidden">
        <div class="absolute inset-0 bg-[linear-gradient(to_right,#80808012_1px,transparent_1px),linear-gradient(to_bottom,#80808012_1px,transparent_1px)] bg-[size:24px_24px] moving-grid"></div>
        
        <div class="relative z-10 max-w-7xl mx-auto px-6 text-center">
            <h1 class="text-5xl md:text-7xl font-bold text-white mb-6">
                Project <span class="text-blue-400">Gallery</span>
            </h1>
            <p class="text-slate-300 text-lg max-w-2xl mx-auto mb-10">
                Browse our portfolio of custom tile installations across Minnesota.
            </p>

            <div class="max-w-md mx-auto">
                <input type="text" x-model="search" placeholder="Search projects or cities..." 
                       class="w-full bg-slate-800/50 border-2 border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-blue-500 transition-all backdrop-blur-sm">
            </div>
        </div>
        <div class="absolute bottom-0 left-0 right-0 h-24 bg-gradient-to-t from-white to-transparent"></div>
    </header>

    <section class="max-w-7xl mx-auto px-6 py-12">
        <div class="flex flex-wrap gap-3 justify-center mb-16">
            <template x-for="cat in ['all', 'kitchen', 'shower', 'flooring', 'fireplace', 'commercial']">
                <button @click="category = cat" 
                        :class="category === cat ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'bg-slate-50 text-slate-500 hover:bg-slate-100'"
                        class="px-6 py-3 rounded-xl font-bold uppercase text-[11px] tracking-widest transition-all border border-transparent">
                    <span x-text="cat === 'all' ? 'View All' : cat"></span>
                </button>
            </template>
        </div>

        <div class="columns-1 sm:columns-2 lg:columns-3 gap-8">
            <template x-for="(image, index) in filteredImages" :key="image.src">
                <div class="gallery-card break-inside-avoid mb-8">
                    <div @click="activeLightbox = index" class="group cursor-pointer overflow-hidden rounded-[2rem] shadow-xl bg-white relative border border-slate-100">
                        <img :src="image.src" class="w-full h-auto object-cover group-hover:scale-105 transition-transform duration-700">
                        
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-900/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity p-8 flex flex-col justify-end">
                            <h3 class="text-white text-xl font-bold" x-text="image.title"></h3>
                            <p class="text-blue-400 font-semibold" x-text="image.location"></p>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <div x-show="filteredImages.length === 0" class="text-center py-20" x-cloak>
            <p class="text-slate-400 text-xl font-medium italic">No matches found for that selection.</p>
            <button @click="category='all'; search=''" class="mt-4 text-blue-600 font-bold underline">Show all projects</button>
        </div>
    </section>

    <div x-show="activeLightbox !== undefined" 
         x-cloak
         class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/95 backdrop-blur-xl p-4"
         @keydown.escape.window="activeLightbox = undefined">
        
        <button @click="activeLightbox = undefined" class="absolute top-8 right-8 text-white/50 hover:text-white text-5xl transition-colors">&times;</button>
        
        <button @click="activeLightbox = (activeLightbox - 1 + filteredImages.length) % filteredImages.length" 
                class="absolute left-6 text-white/20 hover:text-blue-400 text-6xl transition-all">‹</button>
        <button @click="activeLightbox = (activeLightbox + 1) % filteredImages.length" 
                class="absolute right-6 text-white/20 hover:text-blue-400 text-6xl transition-all">›</button>
        
        <div class="max-w-5xl w-full text-center">
            <template x-if="filteredImages[activeLightbox]">
                <div>
                    <img :src="filteredImages[activeLightbox].src" class="max-h-[75vh] mx-auto rounded-3xl shadow-2xl border border-white/10 object-contain">
                    <div class="mt-8">
                        <h2 class="text-3xl font-bold text-white mb-2" x-text="filteredImages[activeLightbox].title"></h2>
                        <p class="text-blue-400 font-bold uppercase tracking-widest text-sm" x-text="filteredImages[activeLightbox].location"></p>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <footer class="py-12 border-t border-slate-100 text-center bg-slate-50">
        <p class="text-slate-400 text-xs uppercase tracking-[0.2em] font-bold">&copy; 2026 True Craft Tile & Stone. Master Artistry.</p>
    </footer>

</body>
</html>
