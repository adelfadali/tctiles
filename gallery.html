<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <title>Master Portfolio | True Craft Tile & Stone</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />

    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        [x-cloak] { display: none !important; }
        
        .project-card { transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @media (min-width: 1024px) {
            .project-card:hover { transform: translateY(-12px) scale(1.02); }
        }

        /* Prevent image ghosting on mobile drag */
        img { -webkit-user-drag: none; user-select: none; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="bg-white text-slate-900" 
      x-data="{ 
        navOpen: false,
        activeProject: null,
        activePhotoIndex: 0,
        category: 'all',
        search: '',
        
        // --- DATA SECTION: UPLOAD YOUR PICTURES HERE ---
        projects: [
            {
                id: 1,
                title: 'Modern Herringbone Kitchen',
                location: 'Shakopee, MN',
                category: 'kitchens',
                images: [
                    'kitchen backsplash 0000 Shakopee Minneapolis Tile contractor.jpg',
                    'kitchen backsplash 000 Shakopee Minneapolis Tile contractor.jpg',
                    'kitchen backsplash 00 Shakopee Minneapolis Tile contractor.jpg'
                ]
            },
            {
                id: 2,
                title: 'Custom Stone Fireplace',
                location: 'Bloomington, MN',
                category: 'fireplace',
                images: [
                    'fireplace-1.jpg',
                    'fireplace-2.jpg'
                ]
            },
            {
                id: 3,
                title: 'Commercial Lobby Floor',
                location: 'Minneapolis, MN',
                category: 'commercial',
                images: [
                    'commercial-floor-1.jpg'
                ]
            }
        ],

        get filteredProjects() {
            return this.projects.filter(p => {
                const matchCat = this.category === 'all' || p.category === this.category;
                const matchSearch = p.title.toLowerCase().includes(this.search.toLowerCase()) || 
                                    p.location.toLowerCase().includes(this.search.toLowerCase());
                return matchCat && matchSearch;
            });
        },

        openProject(project) {
            this.activeProject = project;
            this.activePhotoIndex = 0;
            document.body.style.overflow = 'hidden';
        },

        closeProject() {
            this.activeProject = null;
            document.body.style.overflow = 'auto';
        }
      }">

    <nav class="fixed w-full z-50 bg-white/90 backdrop-blur-xl border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html#home" class="flex items-center gap-3">
                <img src="TC tile.jpg" class="h-12 w-auto" alt="Logo" />
                <span class="font-bold text-lg tracking-tight text-slate-900 hidden sm:block">True Craft Tile & Stone</span>
            </a>
            
            <div class="hidden lg:flex items-center space-x-10 font-bold text-[11px] uppercase tracking-[0.2em] text-slate-400">
                <a href="index.html#home" class="hover:text-blue-600 transition">Home</a>
                <a href="gallery.html" class="text-blue-600 border-b-2 border-blue-600 pb-1">Gallery</a>
                <a href="index.html#services" class="hover:text-blue-600 transition">Services</a>
                <a href="tel:9524860554" class="bg-slate-900 text-white px-6 py-3 rounded-full hover:bg-blue-600 transition">Contact Now</a>
            </div>

            <button @click="navOpen = !navOpen" class="lg:hidden p-2 text-slate-900 focus:outline-none">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path x-show="!navOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
                    <path x-show="navOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <div class="lg:hidden bg-white border-t border-slate-100 shadow-xl" x-show="navOpen" x-transition x-cloak>
            <div class="flex flex-col space-y-4 px-6 py-8 font-bold text-xs uppercase tracking-widest">
                <a href="index.html#home" class="text-slate-600 py-2">Home</a>
                <a href="gallery.html" class="text-blue-600 py-2">Gallery</a>
                <a href="index.html#services" class="text-slate-600 py-2">Services</a>
                <a href="tel:9524860554" class="bg-blue-600 text-white text-center py-4 rounded-xl">Call 952-486-0554</a>
            </div>
        </div>
    </nav>

    <header class="relative pt-48 pb-24 bg-slate-950 overflow-hidden">
        <div class="absolute inset-0 opacity-20 bg-[radial-gradient(#3b82f6_1px,transparent_1px)] bg-[size:30px_30px]"></div>
        <div class="relative z-10 max-w-5xl mx-auto px-6 text-center">
            <h1 class="text-6xl md:text-8xl font-bold text-white mb-8 tracking-tighter">Master <span class="text-blue-500 italic text-shadow-xl">Portfolio</span></h1>
            <div class="max-w-xl mx-auto relative group">
                <input type="text" x-model="search" placeholder="Search by city (e.g. Shakopee)..." 
                       class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-8 text-white outline-none focus:border-blue-500 focus:bg-white/10 transition-all">
                <span class="absolute right-6 top-1/2 -translate-y-1/2 opacity-30">🔍</span>
            </div>
        </div>
    </header>

    <section class="sticky top-[75px] z-40 bg-white/90 backdrop-blur-md border-b border-slate-100 py-6">
        <div class="max-w-7xl mx-auto px-6 overflow-x-auto">
            <div class="flex flex-nowrap md:flex-wrap gap-3 justify-start md:justify-center min-w-max md:min-w-0">
                <template x-for="cat in ['all', 'kitchens', 'showers', 'floorings', 'fireplace', 'commercial', 'custom']">
                    <button @click="category = cat" 
                            :class="category === cat ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-400 border-slate-200'"
                            class="px-6 py-3 rounded-xl font-bold uppercase text-[10px] tracking-[0.2em] transition-all border whitespace-nowrap">
                        <span x-text="cat"></span>
                    </button>
                </template>
            </div>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-6 py-20">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
            <template x-for="project in filteredProjects" :key="project.id">
                <div class="project-card group cursor-pointer" @click="openProject(project)">
                    <div class="relative aspect-[4/5] overflow-hidden rounded-[2.5rem] shadow-2xl bg-slate-100">
                        <img :src="project.images[0]" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent opacity-80 p-10 flex flex-col justify-end">
                            <h3 class="text-white text-2xl font-bold" x-text="project.title"></h3>
                            <p class="text-blue-400 font-bold uppercase text-[10px] tracking-widest mt-1" x-text="project.location"></p>
                        </div>
                        <div x-show="project.images.length > 1" class="absolute top-6 right-6 bg-white/20 backdrop-blur-md px-4 py-2 rounded-full border border-white/30 text-white text-[10px] font-black">
                            <span x-text="`+ ${project.images.length - 1} PHOTOS` "></span>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <div x-show="activeProject" x-cloak 
         class="fixed inset-0 z-[100] flex flex-col bg-slate-950/98 backdrop-blur-3xl transition-all duration-300"
         @keydown.escape.window="closeProject()">
        
        <div class="flex justify-between items-center p-6 bg-slate-900/50 border-b border-white/5">
            <div class="text-white">
                <p class="text-[10px] font-black text-blue-500 uppercase tracking-widest" x-text="activeProject?.category"></p>
                <p class="text-sm font-bold opacity-70" x-text="`${activePhotoIndex + 1} of ${activeProject?.images.length}`"></p>
            </div>
            <button @click="closeProject()" class="text-white/50 text-5xl p-2 leading-none">&times;</button>
        </div>

        <div class="relative flex-1 flex items-center justify-center overflow-hidden">
            <button x-show="activeProject?.images.length > 1" 
                    @click="activePhotoIndex = (activePhotoIndex - 1 + activeProject.images.length) % activeProject.images.length"
                    class="hidden md:block absolute left-8 text-white/20 hover:text-blue-500 text-8xl transition-all">‹</button>
            
            <div class="w-full h-full flex items-center justify-center p-4">
                <img :src="activeProject?.images[activePhotoIndex]" 
                     class="max-h-full max-w-full rounded-xl md:rounded-3xl shadow-2xl object-contain transition-all duration-500"
                     style="touch-action: pinch-zoom;">
            </div>

            <button x-show="activeProject?.images.length > 1" 
                    @click="activePhotoIndex = (activePhotoIndex + 1) % activeProject.images.length"
                    class="hidden md:block absolute right-8 text-white/20 hover:text-blue-500 text-8xl transition-all">›</button>
        </div>

        <div class="md:hidden flex justify-between p-8 bg-slate-900/80 border-t border-white/5">
            <button @click="activePhotoIndex = (activePhotoIndex - 1 + activeProject.images.length) % activeProject.images.length"
                    class="text-white font-bold text-xs uppercase px-8 py-4 bg-white/10 rounded-2xl">Previous</button>
            <button @click="activePhotoIndex = (activePhotoIndex + 1) % activeProject.images.length"
                    class="text-white font-bold text-xs uppercase px-8 py-4 bg-blue-600 rounded-2xl shadow-xl">Next Image</button>
        </div>
    </div>

    <footer class="py-20 border-t border-slate-100 text-center">
        <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.4em]">&copy; 2026 True Craft Tile & Stone</p>
    </footer>

</body>
</html>
