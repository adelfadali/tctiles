<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Project Gallery | True Craft Tile & Stone</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />

    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        [x-cloak] { display: none !important; }
        @keyframes moveGrid { from { background-position: 0px 0px; } to { background-position: 24px 24px; } }
        .moving-grid { animation: moveGrid 3s linear infinite; }
        .gallery-card { transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1); }
        .gallery-card:hover { transform: translateY(-8px); }
    </style>
</head>
<body class="bg-white text-slate-900" 
      x-data="{ 
        navOpen: false,
        activeProject: null,
        activePhotoIndex: 0,
        category: 'all',
        search: '',
        
        // PROJECTS GROUPED TOGETHER
        projects: [
            {
                id: 1,
                title: 'Modern Herringbone Kitchen',
                location: 'Shakopee, MN',
                category: 'kitchen',
                images: [
                    'kitchen backsplash 0000 Shakopee Minneapolis Tile contractor.jpg',
                    'kitchen backsplash 000 Shakopee Minneapolis Tile contractor.jpg',
                    'kitchen backsplash 00 Shakopee Minneapolis Tile contractor.jpg'
                ]
            },
            {
                id: 2,
                title: 'Luxury Walk-in Shower',
                location: 'Prior Lake, MN',
                category: 'shower',
                images: [
                    'kitchen backsplash 2 Shakopee Minneapolis Tile contractor.jpg',
                    'kitchen backsplash 3 Shakopee Minneapolis Tile contractor.jpg'
                ]
            },
            {
                id: 3,
                title: 'Master Floor Installation',
                location: 'Minneapolis, MN',
                category: 'flooring',
                images: [
                    'kitchen backsplash 4 Shakopee Minneapolis Tile contractor.jpg',
                    'kitchen backsplash 5 Shakopee Minneapolis Tile contractor.jpg'
                ]
            }
        ],

        get filteredProjects() {
            return this.projects.filter(p => {
                const matchCat = this.category === 'all' || p.category === this.category;
                const matchSearch = p.title.toLowerCase().includes(this.search.toLowerCase()) || 
                                    p.location.toLowerCase().includes(this.search.toLowerCase());
                return matchCat && matchSearch;
            });
        },

        openProject(project) {
            this.activeProject = project;
            this.activePhotoIndex = 0;
        }
      }">

    <nav class="fixed w-full z-50 bg-white/95 backdrop-blur-md border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 py-3 flex justify-between items-center">
            <a href="index.html#home" class="flex items-center gap-3">
                <img src="TC tile.jpg" class="h-14 w-auto" alt="Logo" />
                <span class="font-bold text-lg tracking-tighter text-slate-900 hidden sm:block">True Craft Tile & Stone</span>
            </a>
            <div class="hidden lg:flex items-center space-x-8 font-bold text-xs uppercase tracking-widest text-slate-500">
                <a href="index.html#home" class="hover:text-blue-700 transition">Home</a>
                <a href="gallery.html" class="text-blue-700 border-b-2 border-blue-700">Gallery</a>
                <a href="index.html#services" class="hover:text-blue-700 transition">Services</a>
                <a href="tel:9524860554" class="bg-blue-600 text-white px-5 py-2.5 rounded-lg">Call Now</a>
            </div>
            <button @click="navOpen = !navOpen" class="lg:hidden p-2">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            </button>
        </div>
    </nav>

    <header class="relative pt-40 pb-20 bg-slate-900 overflow-hidden">
        <div class="absolute inset-0 bg-[size:24px_24px] opacity-10 moving-grid" style="background-image: radial-gradient(#fff 1px, transparent 1px);"></div>
        <div class="relative z-10 max-w-7xl mx-auto px-6 text-center">
            <h1 class="text-5xl md:text-7xl font-bold text-white mb-6">Our <span class="text-blue-500">Work</span></h1>
            <div class="max-w-md mx-auto relative">
                <input type="text" x-model="search" placeholder="Search projects..." class="w-full bg-white/10 border border-white/20 rounded-xl p-4 text-white outline-none focus:border-blue-500">
            </div>
        </div>
    </header>

    <section class="max-w-7xl mx-auto px-6 py-12">
        <div class="flex flex-wrap gap-2 justify-center mb-12">
            <template x-for="cat in ['all', 'kitchen', 'shower', 'flooring']">
                <button @click="category = cat" 
                        :class="category === cat ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600'"
                        class="px-6 py-2 rounded-full font-bold uppercase text-[10px] tracking-widest transition-all">
                    <span x-text="cat"></span>
                </button>
            </template>
        </div>

        <div class="columns-1 md:columns-2 lg:columns-3 gap-8">
            <template x-for="project in filteredProjects" :key="project.id">
                <div class="gallery-card break-inside-avoid mb-8 group cursor-pointer" @click="openProject(project)">
                    <div class="relative overflow-hidden rounded-[2rem] shadow-xl">
                        <img :src="project.images[0]" class="w-full h-auto object-cover group-hover:scale-105 transition-transform duration-700">
                        
                        <div class="absolute top-4 right-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-bold text-slate-800 shadow-sm">
                           📸 <span x-text="project.images.length"></span> Photos
                        </div>

                        <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent p-8 flex flex-col justify-end">
                            <h3 class="text-white text-xl font-bold" x-text="project.title"></h3>
                            <p class="text-blue-400 text-xs font-bold uppercase tracking-wider" x-text="project.location"></p>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </section>

    <div x-show="activeProject" x-cloak class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950/95 p-4">
        <button @click="activeProject = null" class="absolute top-8 right-8 text-white text-4xl">&times;</button>
        
        <template x-if="activeProject">
            <div class="w-full max-w-5xl flex flex-col items-center">
                <div class="relative w-full flex items-center justify-center">
                    <button x-show="activeProject.images.length > 1" 
                            @click="activePhotoIndex = (activePhotoIndex - 1 + activeProject.images.length) % activeProject.images.length"
                            class="absolute left-0 text-white/50 hover:text-white text-5xl p-4">‹</button>
                    
                    <img :src="activeProject.images[activePhotoIndex]" class="max-h-[70vh] rounded-2xl shadow-2xl border border-white/10">
                    
                    <button x-show="activeProject.images.length > 1" 
                            @click="activePhotoIndex = (activePhotoIndex + 1) % activeProject.images.length"
                            class="absolute right-0 text-white/50 hover:text-white text-5xl p-4">›</button>
                </div>

                <div class="mt-6 text-center">
                    <h2 class="text-2xl font-bold text-white" x-text="activeProject.title"></h2>
                    <p class="text-blue-500 text-sm font-bold uppercase" x-text="`Photo ${activePhotoIndex + 1} of ${activeProject.images.length}`"></p>
                </div>
            </div>
        </template>
    </div>

    <footer class="py-12 text-center text-slate-400 text-[10px] font-bold uppercase tracking-widest border-t border-slate-100">
        &copy; 2026 True Craft Tile & Stone
    </footer>
</body>
</html>
