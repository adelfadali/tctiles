<section id="contact-form" class="py-24 bg-slate-50 border-t border-slate-200" 
             x-data="{ 
                submitted: false, 
                loading: false,
                async submitForm(e) {
                    this.loading = true;
                    const scriptURL = 'https://script.google.com/macros/s/AKfycbzVCxLxV4PkIEphyQjj-9nCCNxVDhqJnvz8ALcUFYIVd3_6oNZD_EDRRmSW1KV3khBCEg/exec';
                    const formData = new FormData(e.target);
                    try {
                        await fetch(scriptURL, { method: 'POST', body: formData, mode: 'no-cors' });
                        this.loading = false;
                        this.submitted = true;
                    } catch (err) {
                        alert('Submission failed. Please call 952-486-0554');
                        this.loading = false;
                    }
                }
             }">
        <div class="max-w-4xl mx-auto px-6">
            <div class="text-center mb-12">
                <h2 class="text-4xl lg:text-5xl font-bold uppercase tracking-tighter mb-4">Ready to <span class="text-blue-700">Start?</span></h2>
                <p class="text-slate-600 text-lg">35+ Years of Precision Tiling. Get your master-level estimate today.</p>
            </div>

            <div class="bg-slate-900 rounded-[2.5rem] p-8 lg:p-12 shadow-2xl text-white relative overflow-hidden border border-slate-800">
                <div class="absolute inset-0 bg-[linear-gradient(to_right,#80808012_1px,transparent_1px),linear-gradient(to_bottom,#80808012_1px,transparent_1px)] bg-[size:24px_24px] opacity-20 pointer-events-none"></div>

                <div x-show="!submitted" class="relative z-10">
                    <form @submit.prevent="submitForm($event)" class="space-y-5">
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-500 ml-2">Full Name</label>
                            <input type="text" name="name" placeholder="John Doe" required 
                                   class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-blue-500 transition-all">
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                            <div class="space-y-2">
                                <label class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-500 ml-2">Phone</label>
                                <input type="tel" name="phone" placeholder="952-486-0554" required 
                                       class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-blue-500 transition-all">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-500 ml-2">Email</label>
                                <input type="email" name="email" placeholder="email@example.com" required 
                                       class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-blue-500 transition-all">
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-500 ml-2">Project Type</label>
                            <select name="service" required class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-blue-500 transition-all appearance-none">
                                <option disabled selected value="">Select a Service</option>
                                <option>Kitchen Backsplash</option>
                                <option>Custom Shower</option>
                                <option>Large Format Flooring</option>
                                <option>Fireplace Tile</option>
                                <option>Commercial Project</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-500 ml-2">Message</label>
                            <textarea name="message" placeholder="Tell us about your project..." rows="4" 
                                      class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl p-4 text-white outline-none focus:border-blue-500 transition-all"></textarea>
                        </div>

                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl uppercase tracking-widest transition-all shadow-xl shadow-blue-900/40 disabled:opacity-50" :disabled="loading">
                            <span x-show="!loading">Send Estimate Request</span>
                            <span x-show="loading">Processing...</span>
                        </button>
                    </form>
                </div>

                <div x-show="submitted" class="text-center py-16 relative z-10" x-cloak>
                    <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-600/20 text-blue-500 text-5xl rounded-full mb-6">✓</div>
                    <h3 class="text-3xl font-bold uppercase mb-4 tracking-tighter">Request Received</h3>
                    <p class="text-slate-400 text-lg mb-8">We will contact you within 24 hours to discuss your project.</p>
                    <button @click="submitted = false" class="text-blue-500 font-bold uppercase text-xs tracking-widest hover:underline">Send another message</button>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-12 text-center border-t border-slate-100 bg-white">
        <div class="mb-6 flex justify-center gap-6 grayscale opacity-50">
            <img src="TC tile.jpg" class="h-8 w-auto filter grayscale" alt="Logo" />
        </div>
        <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.5em]">&copy; 2026 True Craft Tile & Stone</p>
    </footer>
