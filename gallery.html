<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gallery | True Craft Tile & Stone</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        [x-cloak] { display: none !important; }
        .gallery-item { transition: all 0.4s ease; }
        .animate-fadeInUp { animation: fadeInUp 0.6s ease forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900" 
      x-data="{
        activeLightbox: false,
        currentImage: 0,
        category: 'all',
        search: '',
        allImages: [
            { src: 'kitchen backsplash 0000 Shakopee Minneapolis Tile contractor.jpg', category: 'kitchen', title: 'Modern Herringbone', location: 'Shakopee' },
            { src: 'kitchen backsplash 000 Shakopee Minneapolis Tile contractor.jpg', category: 'kitchen', title: 'Classic Subway Tile', location: 'Minneapolis' },
            { src: 'kitchen backsplash 00 Shakopee Minneapolis Tile contractor.jpg', category: 'kitchen', title: 'Contemporary Mosaic', location: 'Bloomington' },
            { src: 'kitchen backsplash 0 Shakopee Minneapolis Tile contractor.jpg', category: 'kitchen', title: 'Custom Porcelain', location: 'Shakopee' },
            { src: 'kitchen backsplash 2 Shakopee Minneapolis Tile contractor.jpg', category: 'shower', title: 'Schluter Shower System', location: 'Minneapolis' },
            { src: 'kitchen backsplash 3 Shakopee Minneapolis Tile contractor.jpg', category: 'shower', title: 'Luxury Walk-in Shower', location: 'Prior Lake' },
            { src: 'kitchen backsplash 4 Shakopee Minneapolis Tile contractor.jpg', category: 'flooring', title: 'Large Format Floor Tile', location: 'Shakopee' },
            { src: 'kitchen backsplash 5 Shakopee Minneapolis Tile contractor.jpg', category: 'flooring', title: 'Natural Stone Flooring', location: 'Eden Prairie' },
            { src: 'kitchen backsplash 44Shakopee Minneapolis Tile contractor.jpg', category: 'kitchen', title: 'High-End Kitchen Detail', location: 'Minneapolis' },
            { src: 'kitchen backsplash 444Shakopee Minneapolis Tile contractor.jpg', category: 'kitchen', title: 'Master Craftsmanship', location: 'Shakopee' }
        ],
        get filteredImages() {
            const filtered = this.allImages.filter(img => {
                const matchCategory = this.category === 'all' || img.category === this.category;
                const matchSearch = img.title.toLowerCase().includes(this.search.toLowerCase()) || 
                                    img.location.toLowerCase().includes(this.search.toLowerCase());
                return matchCategory && matchSearch;
            });
            return filtered;
        },
        openLightbox(index) { 
            this.currentImage = index; 
            this.activeLightbox = true; 
        }
      }">

    <nav class="fixed w-full z-50 bg-white/95 backdrop-blur-md border-b shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2">
                <img src="TC tile.jpg" class="h-12 w-auto" alt="Logo">
                <span class="font-bold text-lg hidden sm:block">True Craft Tile & Stone</span>
            </a>
            <div class="flex gap-6 font-bold text-xs uppercase tracking-widest text-slate-600">
                <a href="index.html" class="hover:text-blue-600">Home</a>
                <a href="gallery.html" class="text-blue-600 border-b-2 border-blue-600">Gallery</a>
            </div>
        </div>
    </nav>

    <section class="bg-slate-900 text-white pt-32 pb-20 px-6">
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="text-4xl md:text-6xl font-bold mb-6">Project <span class="text-blue-400">Gallery</span></h1>
            <input type="text" x-model="search" placeholder="Search projects or cities..." 
                   class="w-full max-w-md px-6 py-4 bg-white/10 border border-white/20 rounded-full text-white outline-none focus:border-blue-400">
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-6 py-10">
        <div class="flex flex-wrap gap-2 justify-center mb-12">
            <template x-for="cat in ['all', 'kitchen', 'shower', 'flooring', 'fireplace', 'commercial']">
                <button @click="category = cat; search = ''" 
                        :class="category === cat ? 'bg-blue-600 text-white' : 'bg-white text-slate-600 border-slate-200'"
                        class="px-6 py-3 rounded-full font-bold uppercase text-[10px] tracking-widest border transition-all hover:shadow-md">
                    <span x-text="cat"></span>
                </button>
            </template>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <template x-for="(image, index) in filteredImages" :key="image.src">
                <div class="gallery-item animate-fadeInUp">
                    <div @click="openLightbox(index)" class="group cursor-pointer overflow-hidden rounded-2xl shadow-lg bg-white relative aspect-square">
                        <img :src="image.src" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-end p-6">
                            <h3 class="text-white font-bold" x-text="image.title"></h3>
                            <p class="text-blue-300 text-sm" x-text="image.location"></p>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <div x-show="filteredImages.length === 0" class="text-center py-20" x-cloak>
            <p class="text-xl text-slate-400">No images found. Try selecting "all".</p>
            <button @click="category='all'" class="text-blue-600 underline mt-2">Reset Filter</button>
        </div>
    </section>

    <div x-show="activeLightbox" x-cloak 
         class="fixed inset-0 z-[100] flex items-center justify-center bg-black/95 p-4"
         @keydown.escape.window="activeLightbox = false">
        
        <button @click="activeLightbox = false" class="absolute top-6 right-6 text-white text-5xl">&times;</button>
        
        <button @click="currentImage = (currentImage - 1 + filteredImages.length) % filteredImages.length" 
                class="absolute left-4 text-white text-6xl hover:text-blue-400">‹</button>
        <button @click="currentImage = (currentImage + 1) % filteredImages.length" 
                class="absolute right-4 text-white text-6xl hover:text-blue-400">›</button>
        
        <div class="max-w-4xl w-full text-center">
            <img :src="filteredImages[currentImage]?.src" class="max-h-[75vh] mx-auto rounded shadow-2xl">
            <div class="mt-6 text-white" x-show="filteredImages[currentImage]">
                <h2 class="text-xl font-bold" x-text="filteredImages[currentImage].title"></h2>
                <p class="text-blue-400" x-text="filteredImages[currentImage].location"></p>
            </div>
        </div>
    </div>

</body>
</html>
