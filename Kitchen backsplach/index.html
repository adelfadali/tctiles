<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <title>Master Portfolio | True Craft Tile & Stone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-white text-slate-900" 
      x-data="{ 
        category: 'all',
        activeProject: null,
        fullscreenPhoto: null,
        activePhotoIndex: 0,
        search: '',
        projects: [
            {
                id: 1,
                title: 'Full Backsplash',
                location: 'Shakopee, MN',
                category: 'kitchens',
                images: [
                    '../kitchen backsplash 000 Shakopee Minneapolis Tile contractor.jpg',
                    '../kitchen backsplash 0000 Shakopee Minneapolis Tile contractor.jpg',
                    '../kitchen backsplash 00 Shakopee Minneapolis Tile contractor.jpg',
                    '../kitchen backsplash 0 Shakopee Minneapolis Tile contractor.jpg',
                    '../kitchen backsplash1 Shakopee Minneapolis Tile contractor.jpg'
                ]
            },
            {
                id: 2,
                title: 'Premium Backsplash',
                location: 'Chaska, MN',
                category: 'kitchens',
                images: [
                    'kitchen backsplash done Shakopee Minneapolis Tile contractor.jpg',
                    'kitchen backsplash before done Shakopee Minneapolis Tile contractor.jpg',
                    'kitchen backsplash1 Shakopee Minneapolis Tile contractor.jpg',
                    'kitchen backsplash done1 Shakopee Minneapolis Tile contractor.jpg'
                ]
            },
            {
                id: 3,
                title: 'Subway Backsplash',
                location: 'Minneapolis, MN',
                category: 'kitchens',
                images: [
                    '../kitchen backsplash 4 Shakopee Minneapolis Tile contractor.jpg',
                    '../kitchen backsplash 3 Shakopee Minneapolis Tile contractor.jpg',
                    '../kitchen backsplash 2 Shakopee Minneapolis Tile contractor.jpg',
                    '../kitchen backsplash 5 Shakopee Minneapolis Tile contractor.jpg'
                ]
            },
            {
                id: 4,
                title: 'Large Kitchen Backsplash',
                location: 'Prior Lake, MN',
                category: 'kitchens',
                images: [
                    '../kitchen backsplash 444Shakopee Minneapolis Tile contractor.jpg',
                    '../kitchen backsplash 4444Shakopee Minneapolis Tile contractor.jpg',
                    '../kitchen backsplash 44Shakopee Minneapolis Tile contractor.jpg'
                ]
            },
            {
                id: 5,
                title: 'Schluter Heated Floor & Shower',
                location: 'Chaska, MN',
                category: 'showers',
                images: [
                    'Shakopee Minneapolis Tile contractor bathroom remodeling 15.jpg',
                    'Shakopee Minneapolis Tile contractor bathroom remodeling 14.jpg',
                    'Shakopee Minneapolis Tile contractor bathroom remodeling 13.jpg',
                    'Shakopee Minneapolis Tile contractor bathroom remodeling 12.jpg'
                ]
            },
            {
                id: 6,
                title: 'Premium Bathroom Renovation',
                location: 'Eden Prairie, MN',
                category: 'showers',
                images: [
                    'Shakopee Minneapolis Tile contractor bathroom remodeling4.jpg',
                    'Shakopee Minneapolis Tile contractor bathroom remodeling4 before.jpg',
                    'Shakopee Minneapolis Tile contractor bathroom remodeling3.jpg',
                    'Shakopee Minneapolis Tile contractor bathroom remodeling2.jpg'
                ]
            },
            {
                id: 7,
                title: 'Schluter Walk-in Shower',
                location: 'Richfield, MN',
                category: 'showers',
                images: [
                    'Shakopee Minneapolis Tile contractor bathroom remodeling 55.jpg',
                    'Shakopee Minneapolis Tile contractor bathroom remodeling 54.jpg',
                    'Shakopee Minneapolis Tile contractor bathroom remodeling 53.jpg'
                ]
            }
        ],
        get filteredProjects() {
            return this.projects.filter(p => {
                const matchCat = this.category === 'all' || p.category === this.category;
                const matchSearch = p.title.toLowerCase().includes(this.search.toLowerCase()) || p.location.toLowerCase().includes(this.search.toLowerCase());
                return matchCat && matchSearch;
            });
        },
        openProject(project) { this.activeProject = project; document.body.style.overflow = 'hidden'; },
        closeProject() { this.activeProject = null; this.fullscreenPhoto = null; document.body.style.overflow = 'auto'; }
      }">

    <header class="pt-24 pb-12 bg-slate-900 text-center text-white">
        <h1 class="text-5xl font-bold mb-4">Master Portfolio</h1>
        <p class="text-slate-400 uppercase tracking-widest text-xs">Excellence in every tile</p>
        <div class="mt-8 px-6">
            <input type="text" x-model="search" placeholder="Search projects..." class="max-w-md w-full bg-slate-800 border border-slate-700 rounded-xl p-4 outline-none focus:border-blue-500">
        </div>
    </header>

    <div class="sticky top-0 z-30 bg-white border-b py-4 flex justify-center gap-2 overflow-x-auto px-6">
        <template x-for="cat in ['all', 'kitchens', 'showers']">
            <button @click="category = cat" 
                    :class="category === cat ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600'"
                    class="px-5 py-2 rounded-lg font-bold uppercase text-[10px] transition-all" x-text="cat"></button>
        </template>
    </div>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <template x-for="project in filteredProjects" :key="project.id">
                <div class="cursor-pointer group" @click="openProject(project)">
                    <div class="aspect-[4/5] rounded-3xl overflow-hidden shadow-lg relative">
                        <img :src="project.images[0]" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent p-6 flex flex-col justify-end">
                            <h3 class="text-white text-xl font-bold" x-text="project.title"></h3>
                            <p class="text-blue-400 text-xs font-bold" x-text="project.location"></p>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    </body>
</html>
