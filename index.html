    toggleNav() {
        this.navOpen = !this.navOpen;
        document.documentElement.classList.toggle('nav-open', this.navOpen);
    },
    closeNav() {
        this.navOpen = false;
        document.documentElement.classList.remove('nav-open');
    },
    init() {
        setInterval(() => this.next(), 3500);
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    },
    async submitForm(e) {
        this.loading = true;

        try {
            await fetch(scriptURL, { method: 'POST', body: formData, mode: 'no-cors' });
            this.loading = false;
            this.submitted = true;
        } catch (err) {
            alert('Submission failed. Please call 952-486-0554');
            this.loading = false;
        }
    },
    async submitQuoteForm(e) {
        this.loadingQuote = true;

        const adsScriptURL = 'https://script.google.com/macros/s/YOUR_GOOGLE_ADS_SCRIPT_ID/exec';
        const formData = new FormData(e.target);
        
        // Add tracking parameters
        formData.append('source', 'google_ads');
        formData.append('conversion_type', 'lead');
        formData.append('timestamp', new Date().toISOString());
        
        try {
            await fetch(adsScriptURL, { method: 'POST', body: formData, mode: 'no-cors' });
            this.loadingQuote = false;
            this.submittedQuote = true;

                body: formData,

            });

            alert('Submission failed. Please call 952-486-0554');
            this.loadingQuote = false;
        }
    }
